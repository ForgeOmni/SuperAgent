<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SuperAgent - Multi-Agent Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            color: #333;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }
        
        header {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 15px;
            padding: 20px 30px;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        
        h1 {
            color: #667eea;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .status-indicator {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #10b981;
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }
        
        .stat-card {
            background: white;
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
            transition: transform 0.3s;
        }
        
        .stat-card:hover {
            transform: translateY(-5px);
        }
        
        .stat-label {
            font-size: 12px;
            color: #666;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 5px;
        }
        
        .stat-value {
            font-size: 32px;
            font-weight: bold;
            color: #333;
        }
        
        .stat-change {
            font-size: 14px;
            color: #10b981;
            margin-top: 5px;
        }
        
        .agents-container {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        
        .section-title {
            font-size: 20px;
            margin-bottom: 15px;
            color: #333;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .agent-list {
            display: grid;
            gap: 15px;
        }
        
        .agent-card {
            background: #f8f9fa;
            border-radius: 10px;
            padding: 15px;
            border-left: 4px solid #667eea;
            transition: all 0.3s;
        }
        
        .agent-card.running { border-left-color: #10b981; }
        .agent-card.failed { border-left-color: #ef4444; }
        .agent-card.completed { border-left-color: #3b82f6; }
        
        .agent-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }
        
        .agent-name {
            font-weight: 600;
            font-size: 16px;
        }
        
        .agent-status {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 500;
            text-transform: uppercase;
        }
        
        .status-running {
            background: #d1fae5;
            color: #065f46;
        }
        
        .status-pending {
            background: #fed7aa;
            color: #92400e;
        }
        
        .status-completed {
            background: #dbeafe;
            color: #1e40af;
        }
        
        .status-failed {
            background: #fee2e2;
            color: #991b1b;
        }
        
        .agent-activity {
            font-size: 14px;
            color: #666;
            margin-bottom: 10px;
            font-style: italic;
        }
        
        .agent-metrics {
            display: flex;
            gap: 20px;
            font-size: 14px;
        }
        
        .metric {
            display: flex;
            align-items: center;
            gap: 5px;
        }
        
        .metric-icon {
            font-size: 16px;
        }
        
        .progress-bar {
            width: 100%;
            height: 4px;
            background: #e5e7eb;
            border-radius: 2px;
            overflow: hidden;
            margin-top: 10px;
        }
        
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea, #764ba2);
            transition: width 0.3s;
        }
        
        .connection-status {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: white;
            padding: 10px 20px;
            border-radius: 30px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .connection-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #ef4444;
        }
        
        .connection-dot.connected {
            background: #10b981;
        }
        
        .team-section {
            margin-bottom: 30px;
        }
        
        .team-header {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            padding: 15px;
            border-radius: 10px 10px 0 0;
            font-weight: 600;
        }
        
        .team-members {
            background: white;
            border-radius: 0 0 10px 10px;
            padding: 15px;
        }
        
        .performance-chart {
            margin-top: 20px;
            height: 200px;
            background: #f8f9fa;
            border-radius: 10px;
            padding: 15px;
            position: relative;
        }
        
        canvas {
            width: 100% !important;
            height: 170px !important;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>
                🤖 SuperAgent Dashboard
                <span class="status-indicator"></span>
            </h1>
            <p style="color: #666; margin-top: 5px;">Real-time Multi-Agent Monitoring</p>
        </header>
        
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-label">Active Agents</div>
                <div class="stat-value" id="active-agents">0</div>
                <div class="stat-change">↑ <span id="agents-change">0</span> from last update</div>
            </div>
            
            <div class="stat-card">
                <div class="stat-label">Total Tokens</div>
                <div class="stat-value" id="total-tokens">0</div>
                <div class="stat-change">+<span id="tokens-rate">0</span>/sec</div>
            </div>
            
            <div class="stat-card">
                <div class="stat-label">Tool Uses</div>
                <div class="stat-value" id="tool-uses">0</div>
                <div class="stat-change">+<span id="tools-rate">0</span>/min</div>
            </div>
            
            <div class="stat-card">
                <div class="stat-label">Teams</div>
                <div class="stat-value" id="total-teams">0</div>
                <div class="stat-change"><span id="team-utilization">0</span>% capacity</div>
            </div>
        </div>
        
        <div class="agents-container">
            <div class="section-title">
                📊 Agent Activity
                <span style="font-size: 14px; color: #666; font-weight: normal;">
                    Updated: <span id="last-update">Never</span>
                </span>
            </div>
            
            <div id="teams-container">
                <!-- Teams will be dynamically inserted here -->
            </div>
            
            <div class="performance-chart">
                <canvas id="performance-chart"></canvas>
            </div>
        </div>
    </div>
    
    <div class="connection-status">
        <div class="connection-dot" id="connection-dot"></div>
        <span id="connection-text">Disconnected</span>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script>
        // WebSocket connection
        let ws = null;
        let reconnectTimer = null;
        let lastUpdate = {};
        let chart = null;
        let chartData = {
            labels: [],
            datasets: [{
                label: 'Tokens/sec',
                data: [],
                borderColor: '#667eea',
                backgroundColor: 'rgba(102, 126, 234, 0.1)',
                tension: 0.4
            }]
        };
        
        function connect() {
            const wsUrl = `ws://${window.location.hostname}:8080/progress`;
            
            try {
                ws = new WebSocket(wsUrl);
                
                ws.onopen = () => {
                    console.log('Connected to WebSocket');
                    updateConnectionStatus(true);
                    
                    // Subscribe to all updates
                    ws.send(JSON.stringify({
                        type: 'subscribe',
                        all: true
                    }));
                };
                
                ws.onmessage = (event) => {
                    const data = JSON.parse(event.data);
                    handleMessage(data);
                };
                
                ws.onerror = (error) => {
                    console.error('WebSocket error:', error);
                    updateConnectionStatus(false);
                };
                
                ws.onclose = () => {
                    console.log('WebSocket disconnected');
                    updateConnectionStatus(false);
                    scheduleReconnect();
                };
                
            } catch (error) {
                console.error('Failed to connect:', error);
                updateConnectionStatus(false);
                scheduleReconnect();
            }
        }
        
        function scheduleReconnect() {
            if (reconnectTimer) return;
            
            reconnectTimer = setTimeout(() => {
                reconnectTimer = null;
                connect();
            }, 3000);
        }
        
        function updateConnectionStatus(connected) {
            const dot = document.getElementById('connection-dot');
            const text = document.getElementById('connection-text');
            
            if (connected) {
                dot.classList.add('connected');
                text.textContent = 'Connected';
            } else {
                dot.classList.remove('connected');
                text.textContent = 'Reconnecting...';
            }
        }
        
        function handleMessage(data) {
            switch (data.type) {
                case 'initial_state':
                case 'update':
                    updateDashboard(data);
                    break;
                case 'pong':
                    // Keep-alive response
                    break;
                default:
                    console.log('Unknown message type:', data.type);
            }
        }
        
        function updateDashboard(data) {
            const progress = data.progress || {};
            const hierarchy = data.hierarchy || [];
            
            // Update stats
            updateStats(progress);
            
            // Update agent display
            updateAgents(hierarchy);
            
            // Update chart
            updateChart(progress);
            
            // Update timestamp
            document.getElementById('last-update').textContent = 
                new Date().toLocaleTimeString();
            
            lastUpdate = progress;
        }
        
        function updateStats(progress) {
            const activeAgents = progress.totalAgents || 0;
            const totalTokens = progress.totalTokens || 0;
            const toolUses = progress.totalToolUses || 0;
            const teams = Object.keys(progress.teams || {}).length;
            
            // Update values with animation
            animateValue('active-agents', activeAgents);
            animateValue('total-tokens', totalTokens);
            animateValue('tool-uses', toolUses);
            animateValue('total-teams', teams);
            
            // Calculate rates
            if (lastUpdate.totalTokens) {
                const tokenRate = totalTokens - lastUpdate.totalTokens;
                document.getElementById('tokens-rate').textContent = 
                    tokenRate > 0 ? tokenRate : 0;
            }
            
            if (lastUpdate.totalToolUses) {
                const toolRate = (toolUses - lastUpdate.totalToolUses) * 60;
                document.getElementById('tools-rate').textContent = 
                    toolRate > 0 ? Math.round(toolRate) : 0;
            }
        }
        
        function updateAgents(hierarchy) {
            const container = document.getElementById('teams-container');
            container.innerHTML = '';
            
            hierarchy.forEach(group => {
                if (group.type === 'team') {
                    const teamSection = createTeamSection(group);
                    container.appendChild(teamSection);
                } else {
                    const standaloneSection = createStandaloneSection(group);
                    container.appendChild(standaloneSection);
                }
            });
        }
        
        function createTeamSection(team) {
            const section = document.createElement('div');
            section.className = 'team-section';
            
            const header = document.createElement('div');
            header.className = 'team-header';
            header.innerHTML = `📂 ${team.name} <span style="opacity: 0.8; font-size: 14px;">(${team.members.length} agents)</span>`;
            
            const members = document.createElement('div');
            members.className = 'team-members';
            
            const agentList = document.createElement('div');
            agentList.className = 'agent-list';
            
            team.members.forEach(member => {
                agentList.appendChild(createAgentCard(member));
            });
            
            members.appendChild(agentList);
            section.appendChild(header);
            section.appendChild(members);
            
            return section;
        }
        
        function createStandaloneSection(group) {
            const section = document.createElement('div');
            section.className = 'team-section';
            
            const header = document.createElement('div');
            header.className = 'section-title';
            header.innerHTML = `📌 Standalone Agents`;
            
            const agentList = document.createElement('div');
            agentList.className = 'agent-list';
            
            group.members.forEach(member => {
                agentList.appendChild(createAgentCard(member));
            });
            
            section.appendChild(header);
            section.appendChild(agentList);
            
            return section;
        }
        
        function createAgentCard(agent) {
            const card = document.createElement('div');
            card.className = `agent-card ${agent.status.toLowerCase()}`;
            
            const statusClass = `status-${agent.status.toLowerCase()}`;
            const statusEmoji = getStatusEmoji(agent.status);
            
            card.innerHTML = `
                <div class="agent-header">
                    <span class="agent-name">${agent.name}</span>
                    <span class="agent-status ${statusClass}">${statusEmoji} ${agent.status}</span>
                </div>
                ${agent.currentActivity ? `<div class="agent-activity">${agent.currentActivity}</div>` : ''}
                <div class="agent-metrics">
                    <div class="metric">
                        <span class="metric-icon">💬</span>
                        <span>${formatNumber(agent.tokenCount)} tokens</span>
                    </div>
                    <div class="metric">
                        <span class="metric-icon">🔧</span>
                        <span>${agent.toolUseCount} tools</span>
                    </div>
                    ${agent.node ? `
                    <div class="metric">
                        <span class="metric-icon">🖥️</span>
                        <span>${agent.node}</span>
                    </div>` : ''}
                </div>
                <div class="progress-bar">
                    <div class="progress-fill" style="width: ${getProgress(agent)}%"></div>
                </div>
            `;
            
            return card;
        }
        
        function getStatusEmoji(status) {
            const emojis = {
                'running': '🔄',
                'pending': '⏳',
                'completed': '✅',
                'failed': '❌',
                'cancelled': '⛔',
                'paused': '⏸️'
            };
            return emojis[status.toLowerCase()] || '❓';
        }
        
        function getProgress(agent) {
            // Simple progress calculation based on token count
            const maxTokens = 10000;
            return Math.min(100, (agent.tokenCount / maxTokens) * 100);
        }
        
        function formatNumber(num) {
            if (num < 1000) return num;
            if (num < 1000000) return (num / 1000).toFixed(1) + 'K';
            return (num / 1000000).toFixed(1) + 'M';
        }
        
        function animateValue(elementId, value) {
            const element = document.getElementById(elementId);
            const current = parseInt(element.textContent) || 0;
            const increment = (value - current) / 10;
            let step = 0;
            
            const timer = setInterval(() => {
                step++;
                const newValue = Math.round(current + increment * step);
                element.textContent = formatNumber(newValue);
                
                if (step >= 10) {
                    element.textContent = formatNumber(value);
                    clearInterval(timer);
                }
            }, 30);
        }
        
        function initChart() {
            const ctx = document.getElementById('performance-chart').getContext('2d');
            chart = new Chart(ctx, {
                type: 'line',
                data: chartData,
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: {
                            display: false
                        },
                        title: {
                            display: true,
                            text: 'Token Processing Rate'
                        }
                    },
                    scales: {
                        x: {
                            display: true,
                            grid: {
                                display: false
                            }
                        },
                        y: {
                            display: true,
                            beginAtZero: true
                        }
                    }
                }
            });
        }
        
        function updateChart(progress) {
            if (!chart) return;
            
            const now = new Date().toLocaleTimeString();
            const tokens = progress.totalTokens || 0;
            
            // Add new data point
            chartData.labels.push(now);
            chartData.datasets[0].data.push(tokens);
            
            // Keep only last 20 points
            if (chartData.labels.length > 20) {
                chartData.labels.shift();
                chartData.datasets[0].data.shift();
            }
            
            chart.update();
        }
        
        // Simulate data for demo when not connected
        function simulateData() {
            if (ws && ws.readyState === WebSocket.OPEN) return;
            
            const mockData = {
                type: 'update',
                progress: {
                    totalAgents: Math.floor(Math.random() * 10) + 1,
                    totalTokens: Math.floor(Math.random() * 50000),
                    totalToolUses: Math.floor(Math.random() * 100),
                    teams: { team1: {}, team2: {} }
                },
                hierarchy: [
                    {
                        type: 'team',
                        name: 'Demo Team',
                        members: [
                            {
                                name: 'DataProcessor',
                                status: 'running',
                                currentActivity: 'Processing batch #42',
                                tokenCount: Math.floor(Math.random() * 5000),
                                toolUseCount: Math.floor(Math.random() * 20)
                            },
                            {
                                name: 'Analyzer',
                                status: 'running',
                                currentActivity: 'Analyzing results',
                                tokenCount: Math.floor(Math.random() * 3000),
                                toolUseCount: Math.floor(Math.random() * 15)
                            }
                        ]
                    },
                    {
                        type: 'standalone',
                        members: [
                            {
                                name: 'ReportWriter',
                                status: 'pending',
                                tokenCount: Math.floor(Math.random() * 2000),
                                toolUseCount: Math.floor(Math.random() * 10)
                            }
                        ]
                    }
                ]
            };
            
            updateDashboard(mockData);
        }
        
        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            initChart();
            connect();
            
            // Simulate data every 2 seconds if not connected
            setInterval(simulateData, 2000);
            
            // Send ping every 30 seconds to keep connection alive
            setInterval(() => {
                if (ws && ws.readyState === WebSocket.OPEN) {
                    ws.send(JSON.stringify({ type: 'ping' }));
                }
            }, 30000);
        });
    </script>
</body>
</html>
