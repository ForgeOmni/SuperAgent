name: doc-writer
description: Generate technical documentation for a subject — outline, draft, then an edited final.
phases:
  - title: Outline
  - title: Draft
  - title: Edit

schemas:
  outline:
    type: object
    required: [sections]
    properties:
      sections:
        type: array
        minItems: 1
        items: {type: string}

steps:
  - name: outline
    phase: Outline
    role: doc-writer
    prompt: |
      Produce a documentation outline for: {{args.subject}}
      Audience: {{args.audience}}
      Lead with purpose, then a minimal working example, then reference detail.
    schema: outline

  - name: draft
    phase: Draft
    role: doc-writer
    prompt: |
      Write the documentation following this outline for "{{args.subject}}"
      (audience: {{args.audience}}). Include a concrete, runnable example.

      Outline:
      {{steps.outline.output}}

  - name: final
    phase: Edit
    role: editor
    prompt: |
      Edit this documentation for clarity, correctness, and flow. Keep the example.
      Output the final document only.

      Draft:
      {{steps.draft.output}}

return: final
