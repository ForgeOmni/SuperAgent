name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  phpunit:
    name: PHPUnit (PHP ${{ matrix.php }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        php: ['8.1', '8.2', '8.3']

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: mbstring, openssl, json, curl
          coverage: none
          tools: composer:v2

      - name: Validate composer.json
        run: composer validate --strict

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: vendor
          key: composer-${{ runner.os }}-php${{ matrix.php }}-${{ hashFiles('composer.lock', 'composer.json') }}
          restore-keys: |
            composer-${{ runner.os }}-php${{ matrix.php }}-

      - name: Install dependencies
        run: composer install --prefer-dist --no-progress --no-interaction

      # Compat first — if these fail the rest of the suite is meaningless.
      - name: Compat lockdown tests
        run: vendor/bin/phpunit --testsuite Compat

      - name: Unit tests
        run: vendor/bin/phpunit --testsuite Unit

      - name: Smoke tests
        run: vendor/bin/phpunit --testsuite Smoke
        # Smoke tests are allowed to be skipped (some need env-gated resources).
        continue-on-error: true

  integration:
    # Only runs when the workflow is triggered manually or on a release tag.
    # Real vendor endpoints can be flaky / rate-limited, and they cost money.
    # Maintainers run this before cutting a release; PRs don't need it.
    name: Integration (opt-in)
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: mbstring, openssl, json, curl
          coverage: none
          tools: composer:v2

      - name: Install dependencies
        run: composer install --prefer-dist --no-progress --no-interaction

      - name: Integration tests
        env:
          SUPERAGENT_INTEGRATION: '1'
          # Provider keys injected as GitHub repo secrets — missing secrets
          # cause the relevant test cases to self-skip, not to fail.
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY:    ${{ secrets.OPENAI_API_KEY }}
          GEMINI_API_KEY:    ${{ secrets.GEMINI_API_KEY }}
          KIMI_API_KEY:      ${{ secrets.KIMI_API_KEY }}
          QWEN_API_KEY:      ${{ secrets.QWEN_API_KEY }}
          GLM_API_KEY:       ${{ secrets.GLM_API_KEY }}
          MINIMAX_API_KEY:   ${{ secrets.MINIMAX_API_KEY }}
        run: vendor/bin/phpunit --testsuite Integration || true
        # || true so a single vendor outage doesn't fail the whole release;
        # the maintainer reads the summary and decides whether to block.
